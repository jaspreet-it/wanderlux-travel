<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Request an appointment with WanderLux Travel Agency consultants.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderLux Travel Agency | Appointment Request</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav class="nav">
        <h1 class="logo">WanderLux</h1>

        <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="destinations.html">Destinations/Services</a></li>
            <li><a href="calculator.html">Trip Calculator</a></li>
            <li><a href="appointment.html" class="active">Appointment</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="page-title">
        <h2>Appointment Request</h2>
        <p>Request a meeting with our travel consultant for your next trip.</p>
    </section>

    <section class="form-section fade">
        <form class="box-form" onsubmit="return checkAppForm();">

            <label for="name1">Name</label>
            <input type="text" id="name1" placeholder="Enter your name">

            <label for="email1">Email</label>
            <input type="email" id="email1" placeholder="Enter your email">

            <label for="phone1">Phone</label>
            <input type="text" id="phone1" placeholder="Enter phone number">

            <label for="date1">Preferred Date</label>
            <input type="date" id="date1">

            <label for="msg1">Message</label>
            <textarea id="msg1" rows="5" placeholder="Write your travel request"></textarea>

            <button type="submit">Submit Request</button>

            <p id="appMsg" class="result-text"></p>
        </form>
    </section>

</main>

<footer>
    <p>&copy; 2026 WanderLux Travel Agency. All rights reserved.</p>
</footer>

<script src="js/form.js"></script>
<script src="js/scroll.js"></script>
</body>
</html>
